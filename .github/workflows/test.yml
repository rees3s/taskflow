name: TaskFlow Automation Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Start Backend Server (with logs)
      run: |
        cd backend
        uvicorn main:app --host 0.0.0.0 --port 8000 > backend.log 2>&1 &
        
        echo "Waiting for backend to be ready..."
        for i in {1..30}; do
          if curl -s http://localhost:8000 > /dev/null; then
            echo "Backend is ready!"
            break
          fi
          echo "Waiting... ($i)"
          sleep 2
        done

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman newman-reporter-htmlextra

    - name: Run API Tests
      run: |
        mkdir -p reports
        newman run tests/postman/TaskFlow_API_Collection.json \
          -e tests/postman/TaskFlow_CI_Environment.json \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export reports/api-test-report.html

    - name: Upload API Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: api-test-report
        path: reports/api-test-report.html

    - name: Upload Backend Logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: backend-logs
        path: backend/backend.log


  frontend-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: Start PHP Server
      run: |
        cd frontend
        php -S 127.0.0.1:8080 > php.log 2>&1 &
        sleep 5

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Selenium Dependencies
      run: |
        pip install selenium pytest pytest-html webdriver-manager

    - name: Create Report Folder
      run: mkdir -p reports

    - name: Run Selenium Tests
      env:
        HEADLESS: "true"
      run: |
        cd tests/selenium
        pytest test_frontend.py -v \
          --html=../../reports/frontend-test-report.html \
          --self-contained-html \
          --maxfail=1

    - name: Upload Selenium Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-test-report
        path: reports/frontend-test-report.html

    - name: Upload Screenshots (if failures)
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: selenium-screenshots
        path: reports/screenshots/

    - name: Upload PHP Logs (if failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: php-server-log
        path: frontend/php.log